      - "YAML parser"
    write_scope:
      - "src/state/**"
      - "tests/state/**"
    acceptance:
      - "Can load and save spec, decisions, routes, todo, and run artifacts."
      - "Rejects invalid task transitions."
      - "Rejects ready/running conflicts on overlapping write_scope."
      - "Tests cover valid transition, invalid transition, and write conflict."
    output:
      - "changed_files"
      - "test_results"
      - ".ai/runs/T-005/result.md"

  - id: T-006
